<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Opportunity</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .apply-container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); width: 400px; text-align: center; }
        h2 { color: #333; }
        p { color: #666; }
        .success-message { color: green; font-weight: bold; margin-top: 20px; }
        .back-link { display: block; margin-top: 20px; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="apply-container">
        <h2>Application Confirmation</h2>
        <p>Your application has been successfully submitted!</p>
        <p>You will be notified of the next steps via your registered email.</p>
        <div class="success-message">Application Submitted! ✅</div>
        <a href="http://127.0.0.1:5000/student/dashboard" class="back-link">← Back to Dashboard</a>
    </div>
</body>
</html>
