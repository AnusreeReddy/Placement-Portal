<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Applications</title>
    <link rel="stylesheet" href="http://127.0.0.1:5000/style.css">
    <style>
        .container { max-width: 800px; margin: 40px auto; padding: 20px; background-color: #fff; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); border-radius: 8px; }
        .application-list { list-style: none; padding: 0; }
        .application-item { padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; }
        .application-item h4 { margin: 0; color: #333; }
        .application-item p { margin: 5px 0; font-size: 0.9em; color: #666; }
        .back-btn { text-align: center; margin-top: 20px; }
        .back-btn a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <header><h1>Your Applications & Registrations</h1></header>
    <div class="container">
        <div class="application-list" id="applications-list"></div>
        <div class="back-btn">
            <a href="http://127.0.0.1:5000/student/dashboard">← Back to Dashboard</a>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const applicationsList = document.getElementById('applications-list');
            const appliedOpportunities = JSON.parse(localStorage.getItem('appliedOpportunities')) || [];
            const appliedEvents = JSON.parse(localStorage.getItem('appliedEvents')) || [];

            const allApplications = [...appliedOpportunities, ...appliedEvents];

            if (allApplications.length === 0) {
                applicationsList.innerHTML = '<p style="text-align: center;">You have not applied or registered for any opportunities yet.</p>';
            } else {
                allApplications.forEach(app => {
                    const appItem = document.createElement('div');
                    appItem.className = 'application-item';
                    if (app.type === 'Hackathon' || app.type === 'Workshop' || app.type === 'Seminar') {
                        appItem.innerHTML = `
                            <h4>Registration for ${app.title}</h4>
                            <p><strong>Organizer:</strong> ${app.organizer}</p>
                            <p><strong>Status:</strong> Redirected to Official Website</p>
                            <p><strong>Date:</strong> ${app.date}</p>
                        `;
                    } else {
                        appItem.innerHTML = `
                            <h4>Application for ${app.role} at ${app.company}</h4>
                            <p><strong>Method:</strong> ${app.method || 'Redirected'}</p>
                            <p><strong>Date:</strong> ${app.date}</p>
                        `;
                    }
                    applicationsList.appendChild(appItem);
                });
            }
        });
    </script>
</body>
</html>
