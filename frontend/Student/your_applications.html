<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Applications</title>
    <link rel="stylesheet" href="http://127.0.0.1:5000/style.css">
    <style>
        .container { max-width: 800px; margin: 40px auto; padding: 20px; background-color: #fff; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); border-radius: 8px; }
        .application-list { list-style: none; padding: 0; }
        .application-item { padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; }
        .application-item h4 { margin: 0; color: #333; }
        .application-item p { margin: 5px 0; font-size: 0.9em; color: #666; }
        .back-btn { text-align: center; margin-top: 20px; }
        .back-btn a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <header><h1>Your Applications & Registrations</h1></header>
    <div class="container">
        <div class="application-list" id="applications-list"></div>
        <div class="back-btn">
            <a href="http://127.0.0.1:5000/student/dashboard">← Back to Dashboard</a>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const applicationsList = document.getElementById('applications-list');
            const token = localStorage.getItem('token');

            if (!token) {
                applicationsList.innerHTML = '<p style="text-align: center; color: red;">Please login first.</p>';
                return;
            }

            try {
                const res = await fetch('http://127.0.0.1:5000/my-applications', {
                    headers: {
                        Authorization: 'Bearer ' + token
                    }
                });

                if (!res.ok) {
                    throw new Error('Failed to fetch applications');
                }

                const applications = await res.json();

                if (applications.length === 0) {
                    applicationsList.innerHTML = '<p style="text-align: center;">You have not applied for any opportunities yet.</p>';
                } else {
                    applications.forEach(app => {
                        const appItem = document.createElement('div');
                        appItem.className = 'application-item';
                        const statusColor = app.status === 'accepted' ? '#28a745' : app.status === 'rejected' ? '#dc3545' : '#ffc107';
                        appItem.innerHTML = `
                            <h4>Application for ${app.role} at ${app.company}</h4>
                            <p><strong>Status:</strong> <span style="color: ${statusColor}; font-weight: bold; text-transform: uppercase;">${app.status || 'pending'}</span></p>
                            <p><strong>Applied Date:</strong> ${app.applied_date ? new Date(app.applied_date).toLocaleDateString() : 'N/A'}</p>
                        `;
                        applicationsList.appendChild(appItem);
                    });
                }
            } catch (err) {
                console.error('Error loading applications:', err);
                applicationsList.innerHTML = '<p style="text-align: center; color: red;">Error loading applications. Please try again.</p>';
            }
        });
    </script>
</body>
</html>
