<div class="login-container">
    <h2>Login to PlacementHub</h2>
    <link rel="stylesheet" href="http://127.0.0.1:5000/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-container {
            margin-top: 60px;
            margin-bottom: 60px;
        }
        .role-display {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }
        .role-display p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .role-display strong {
            color: var(--primary);
            font-size: 1.1rem;
        }
        .back-to-roles {
            text-align: center;
            margin-top: 16px;
        }
        .back-to-roles a {
            color: var(--primary);
            font-size: 0.9rem;
        }
    </style>
    <div class="role-display">
        <p>Logging in as: <strong id="selectedRoleDisplay">Student</strong></p>
    </div>
    <form id="loginForm">
        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required>
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" required>
        </div>
        <div class="input-group" style="display: none;">
            <label for="role">Role</label>
            <select id="role" required>
                <option value="" disabled selected>Select Your Role</option>
                <option value="student">Student</option>
                <option value="recruiter">Recruiter</option>
                <option value="placementOfficer">Placement Officer</option>
            </select>
        </div>
        <div class="input-group">
            <button type="submit">Login</button>
        </div>
    </form>
    <div id="loginMessage" class="message"></div>
    <div class="back-to-roles">
        <a href="http://127.0.0.1:5000/">← Back to Role Selection</a>
    </div>
    <a href="http://127.0.0.1:5000/register" style="display: block; text-align: center; margin-top: 16px; color: var(--primary);">Don't have an account? Register here</a>
</div>

<script src="http://127.0.0.1:5000/login.js"></script>
