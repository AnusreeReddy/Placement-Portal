<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Recruiters</title>
    <link rel="stylesheet" href="http://127.0.0.1:5000/style.css">
    <style>
        /* Basic styling for the new page to match the theme */
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; color: #333; margin: 0; }
        header { background-color: #007bff; color: white; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 20px auto; padding: 20px; background-color: #fff; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
        .back-link { display: inline-block; margin-bottom: 20px; color: #007bff; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        form { margin-bottom: 30px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .recruiter-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .recruiter-card { background-color: #e9ecef; border: 1px solid #ddd; padding: 15px; border-radius: 8px; position: relative; }
        .recruiter-card h4 { margin-top: 0; }
        .recruiter-card .edit-btn, .recruiter-card .delete-btn { position: absolute; top: 10px; right: 10px; font-size: 1.2em; color: #6c757d; cursor: pointer; }
        .recruiter-card .delete-btn { right: 40px; color: #dc3545; }
    </style>
</head>
<body>
    <header>
        <h1>Manage Recruiters</h1>
    </header>
    <div class="container">
        <a href="http://127.0.0.1:5000/placement/dashboard" class="back-link">&larr; Back to Dashboard</a>
        
        <section id="add-recruiter">
            <h2>Add New Recruiter</h2>
            <form id="recruiterForm">
                <input type="hidden" id="recruiterId">
                <div class="input-group">
                    <label for="companyName">Company Name</label>
                    <input type="text" id="companyName" required>
                </div>
                <div class="input-group">
                    <label for="recruiterName">Recruiter Name</label>
                    <input type="text" id="recruiterName" required>
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="input-group">
                    <label for="contactNumber">Contact Number</label>
                    <input type="tel" id="contactNumber">
                </div>
                <button type="submit" id="submitBtn">Add Recruiter</button>
            </form>
        </section>

        <section id="view-recruiters">
            <h2>Recruiters List</h2>
            <div id="recruiter-list" class="recruiter-list">
                </div>
        </section>
    </div>
    <script src="http://127.0.0.1:5000/manage_recruiters.js"></script>
</body>
</html>
