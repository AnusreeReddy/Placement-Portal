<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruiter Dashboard</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        /* General Layout */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        header h1 {
            font-size: 2rem;
            margin: 0;
        }

        .container {
            display: flex;
            max-width: 1200px;
            margin: 20px auto;
            background-color: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border-radius: 16px;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            border-right: 1px solid #e0e6ed;
        }

        .main-nav ul {
            list-style: none;
            padding: 0;
        }

        .main-nav li {
            margin-bottom: 10px;
        }

        .main-nav a {
            text-decoration: none;
            color: #555;
            display: block;
            padding: 10px 12px;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .main-nav a:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .logout-btn {
            display: block;
            padding: 10px 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50px;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 600;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        /* Content Sections */
        .content {
            flex-grow: 1;
            padding: 30px;
        }

        section {
            margin-bottom: 30px;
        }

        h2 {
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: #333;
        }

        /* Forms */
        form {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e0e6ed;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .input-group input {
            width: calc(100% - 22px);
            padding: 10px;
            border: 1px solid #e0e6ed;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        /* Lists */
        .job-card, .student-card {
            background-color: #fff;
            border: 1px solid #e0e6ed;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .job-card:hover, .student-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.15);
        }

        .student-list {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .student-card {
            min-width: 300px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Recruiter Portal</h1>
    </header>
    <div class="container">
        <aside class="sidebar">
            <nav class="main-nav">
                <ul>
                    <li><a href="#post-opening">Post an Opening</a></li>
                    <li><a href="#post-hackathon">Post Hackathon</a></li>
                    <li><a href="#post-event">Post Event</a></li>
                    <li><a href="#my-openings">My Openings</a></li>
                    <li><a href="#student-database">View Applications</a></li>
                </ul>
            </nav>
            <a href="http://127.0.0.1:5000/login" class="logout-btn" id="logoutBtn">Logout</a>
        </aside>
        <main class="content">
            <section id="post-opening">
                <h2>Post a Job/Internship Opening</h2>
                <form id="postForm">
                    <div class="input-group">
                        <label for="companyName">Company Name</label>
                        <input type="text" id="companyName" required>
                    </div>
                    <div class="input-group">
                        <label for="jobRole">Job Role</label>
                        <input type="text" id="jobRole" required>
                    </div>
                    <div class="input-group">
                        <label for="stipend">Stipend/Salary</label>
                        <input type="text" id="stipend">
                    </div>
                    <div class="input-group">
                        <label for="duration">Duration</label>
                        <input type="text" id="duration">
                    </div>
                    <div class="input-group">
                        <label for="requiredSkills">Required Skills (comma-separated)</label>
                        <input type="text" id="requiredSkills">
                    </div>
                    <div class="input-group">
                        <label for="redirectingLink">Link to Application Page</label>
                        <input type="url" id="redirectingLink">
                    </div>
                    <div class="input-group">
                        <label for="deadline">Application Deadline</label>
                        <input type="date" id="deadline">
                    </div>

                    <div class="input-group">
                        <label>Minimum CGPA</label>
                            <input type="number" step="0.1" id="cgpa" placeholder="e.g. 7.5">
                    </div>

                    <div class="input-group">
                        <label>Passout Year</label>
                            <input type="number" id="year" placeholder="e.g. 2025">
                    </div>

                    <div class="input-group">
                        <label>Eligible Branches</label>
                        <input type="text" id="branches" placeholder="e.g. CSE, IT, ECE">
                    </div>

                    <div class="input-group">
                        <label>Job Type</label>
                            <select id="job_type">
                                <option value="internship">Internship</option>
                                <option value="job">Full-Time Job</option>
                            </select>
                    </div>

                    <h3>Custom Requirements</h3>

<div id="dynamicFieldsContainer"></div>

<input type="text" id="fieldName" placeholder="Field name">

<select id="fieldType">
<option value="text">Text</option>
<option value="number">Number</option>
</select>

<button type="button" onclick="addField()">
Add Requirement
</button>
                    
                    <button type="submit">Post Opening</button>
                </form>
            </section>
            
            <section id="post-hackathon">
                <h2>Post a Hackathon</h2>
                <form id="postHackathonForm">
                    <div class="input-group">
                        <label for="hackTitle">Title</label>
                        <input type="text" id="hackTitle" required>
                    </div>
                    <div class="input-group">
                        <label for="hackDescription">Description</label>
                        <textarea id="hackDescription" required></textarea>
                    </div>
                    <div class="input-group">
                        <label for="hackOrganizer">Organizer</label>
                        <input type="text" id="hackOrganizer" required>
                    </div>
                    <div class="input-group">
                        <label for="hackSkills">Required Skills</label>
                        <input type="text" id="hackSkills">
                    </div>
                    <div class="input-group">
                        <label for="hackUrl">Registration Link</label>
                        <input type="url" id="hackUrl">
                    </div>
                    <div class="input-group">
                        <label for="hackDeadline">Deadline</label>
                        <input type="date" id="hackDeadline">
                    </div>
                    <button type="submit">Post Hackathon</button>
                </form>
            </section>
            
            <section id="post-event">
                <h2>Post an Event</h2>
                <form id="postEventForm">
                    <div class="input-group">
                        <label for="eventTitle">Title</label>
                        <input type="text" id="eventTitle" required>
                    </div>
                    <div class="input-group">
                        <label for="eventDescription">Description</label>
                        <textarea id="eventDescription" required></textarea>
                    </div>
                    <div class="input-group">
                        <label for="eventOrganizer">Organizer</label>
                        <input type="text" id="eventOrganizer" required>
                    </div>
                    <div class="input-group">
                        <label for="eventSkills">Required Skills</label>
                        <input type="text" id="eventSkills">
                    </div>
                    <div class="input-group">
                        <label for="eventUrl">Registration Link</label>
                        <input type="url" id="eventUrl">
                    </div>
                    <div class="input-group">
                        <label for="eventDeadline">Deadline</label>
                        <input type="date" id="eventDeadline">
                    </div>
                    <button type="submit">Post Event</button>
                </form>
            </section>
            
            <section id="my-openings">
                <h2>My Openings</h2>
                <div id="my-openings-container">
                    </div>
            </section>
            
            <section id="student-database">
                <h2>Applications Received</h2>
                <div class="student-list" id="student-list">
                    </div>
            </section>
        </main>
    </div>
    <script src="http://127.0.0.1:5000/recruiter.js"></script>
</body>
</html>
